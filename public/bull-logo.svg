<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340">
  <defs>
    <linearGradient id="bullGold" x1="0%" y1="0%" x2="100%" y2="80%">
      <stop offset="0%" stop-color="#e8d08a"/>
      <stop offset="40%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#7a5c1a"/>
    </linearGradient>
    <linearGradient id="bullGoldLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0dfa0"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <linearGradient id="bullGoldDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a08030"/>
      <stop offset="100%" stop-color="#5a4210"/>
    </linearGradient>
  </defs>

  <!-- Traced from the reference: charging bull, head down, facing right -->

  <!-- TAIL (curling up) -->
  <path d="M42,105 C30,95 22,78 28,60 C32,48 40,42 48,48 C42,55 38,68 42,82 C44,90 48,98 55,102"
    fill="url(#bullGoldDark)" />

  <!-- REAR HAUNCH -->
  <path d="M55,102 C60,85 72,72 90,68 L130,65 L155,70 L160,95 L150,125 L130,140 L105,148 L80,142 L62,128 L55,102Z"
    fill="url(#bullGold)" />

  <!-- REAR LEG BACK (kicked back) -->
  <path d="M75,142 L65,185 L58,225 L52,260 L48,280 L60,282 L68,275 L72,260 L78,225 L88,185 L95,150"
    fill="url(#bullGoldDark)" />
  <rect x="48" y="278" width="18" height="8" rx="3" fill="#1a1a1a"/>

  <!-- REAR LEG FRONT -->
  <path d="M120,140 L115,180 L110,220 L108,255 L105,275 L118,278 L124,270 L122,255 L125,220 L128,180 L132,148"
    fill="#a08030" />
  <rect x="105" y="273" width="18" height="8" rx="3" fill="#1a1a1a"/>

  <!-- BELLY / UNDERSIDE -->
  <path d="M150,125 L155,140 L190,165 L250,180 L320,178 L380,168 L400,155 L405,135"
    fill="url(#bullGoldDark)" stroke="none"/>

  <!-- MAIN BODY -->
  <path d="M130,65 L180,55 L240,48 L310,45 L370,50 L410,62 L430,78 L425,100 L405,120 L405,135 L380,168 L320,178 L250,180 L190,165 L155,140 L150,125 L160,95 L155,70Z"
    fill="url(#bullGold)" />

  <!-- SHOULDER HUMP (muscular ridge) -->
  <path d="M250,48 L280,32 L320,28 L360,35 L390,48 L410,62 L370,50 L310,45 L250,48Z"
    fill="url(#bullGoldLight)" />

  <!-- FRONT LEG BACK -->
  <path d="M340,168 L335,205 L330,240 L328,265 L325,280 L338,283 L344,275 L342,265 L345,240 L348,205 L355,172"
    fill="#a08030" />
  <rect x="325" y="278" width="18" height="8" rx="3" fill="#1a1a1a"/>

  <!-- FRONT LEG FRONT (extended forward, charging) -->
  <path d="M395,155 L405,185 L418,215 L435,245 L445,268 L442,282 L428,285 L422,278 L425,265 L412,240 L400,210 L390,180 L385,160"
    fill="url(#bullGoldDark)" />
  <rect x="425" y="279" width="18" height="8" rx="3" fill="#1a1a1a"/>

  <!-- NECK -->
  <path d="M410,62 L430,78 L455,88 L475,95 L485,105 L478,118 L460,128 L435,132 L405,135 L405,120 L425,100Z"
    fill="url(#bullGold)" />

  <!-- HEAD (lowered for charge) -->
  <path d="M475,95 L485,105 L498,112 L520,118 L540,120 L548,115 L545,105 L535,98 L518,95 L505,98 L495,102 L485,105 L478,118 L468,130 L460,128 L455,115"
    fill="url(#bullGoldDark)" />

  <!-- SNOUT / MUZZLE -->
  <path d="M535,98 L548,95 L558,100 L560,110 L555,118 L548,115 L545,105Z"
    fill="#7a5c1a" />

  <!-- NOSTRIL -->
  <ellipse cx="552" cy="108" rx="3" ry="2.5" fill="#3a2e10" opacity="0.7"/>

  <!-- EYE -->
  <circle cx="520" cy="105" r="3" fill="#1a1a1a"/>
  <circle cx="519" cy="104" r="1" fill="#c9a84c" opacity="0.5"/>

  <!-- HORN (curving forward and up) -->
  <path d="M540,95 C545,85 555,75 568,72 C575,70 580,74 576,80 C570,78 560,82 548,92"
    fill="url(#bullGoldLight)" stroke="#a08030" stroke-width="0.5"/>

  <!-- HORN 2 (behind) -->
  <path d="M535,98 C538,90 542,82 550,78 C555,76 558,80 554,84 C550,82 545,86 540,94"
    fill="#c9a84c" opacity="0.7"/>

  <!-- EAR -->
  <path d="M525,92 L518,82 L528,88" fill="#b89a40" opacity="0.8"/>

  <!-- MUSCLE LINES -->
  <path d="M180,60 C220,52 280,45 340,50" stroke="#e8d08a" stroke-width="0.6" fill="none" opacity="0.2"/>
  <path d="M170,100 C220,95 300,90 380,100" stroke="#e8d08a" stroke-width="0.5" fill="none" opacity="0.15"/>
  <path d="M200,140 C260,150 330,155 380,148" stroke="#e8d08a" stroke-width="0.4" fill="none" opacity="0.12"/>

  <!-- OUTLINE PATH (for stroke-draw animation) -->
  <path id="bull-outline-path"
    d="M28,60 C32,48 40,42 48,48 C42,55 38,68 42,82 C44,95 55,102 55,102 C60,85 72,72 90,68 L130,65 L180,55 L240,48 L280,32 L320,28 L360,35 L390,48 L410,62 L430,78 L455,88 L475,95 L485,105 L505,98 L520,95 L535,98 L548,95 L558,100 L560,110 L555,118 L540,120 L520,118 L498,112 L478,118 L460,128 L435,132 L405,135 L400,155 L418,215 L445,268 L442,282 L428,285 L422,278 L400,210 L380,168 L340,168 L330,240 L325,280 L338,283 L344,275 L345,240 L355,172 L320,178 L250,180 L190,165 L155,140 L120,140 L110,220 L105,275 L118,278 L125,220 L132,148 L105,148 L80,142 L65,185 L52,260 L48,280 L60,282 L72,260 L88,185 L95,150 L80,142 L62,128 L55,102"
    stroke="#c9a84c"
    stroke-width="1.5"
    fill="none"
    opacity="0"
  />
</svg>
