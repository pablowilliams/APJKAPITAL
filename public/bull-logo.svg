<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="goldBody" x1="0%" y1="0%" x2="100%" y2="80%">
      <stop offset="0%" stop-color="#e8d08a"/>
      <stop offset="40%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8a6820"/>
    </linearGradient>
    <linearGradient id="goldDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a08030"/>
      <stop offset="100%" stop-color="#6a5418"/>
    </linearGradient>
    <linearGradient id="goldHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0dfa0"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
  </defs>

  <!-- CHARGING BULL FROM SIDE - head down, powerful stance -->

  <!-- Back horn -->
  <polygon points="95,72 78,30 88,68" fill="#a08030"/>
  <polygon points="78,30 70,38 88,68" fill="#8a6820"/>

  <!-- Front horn -->
  <polygon points="110,68 120,25 104,62" fill="url(#goldHighlight)"/>
  <polygon points="120,25 128,32 110,68" fill="#c9a84c"/>

  <!-- Head top -->
  <polygon points="88,68 100,58 110,68 104,62" fill="#e0c97f"/>
  <polygon points="78,65 88,68 100,58" fill="#d4b96e"/>

  <!-- Forehead -->
  <polygon points="88,68 110,68 108,82 90,80" fill="url(#goldBody)"/>

  <!-- Left face -->
  <polygon points="78,65 88,68 90,80 80,88" fill="#b89a40"/>

  <!-- Right face -->
  <polygon points="110,68 118,72 115,85 108,82" fill="#a08030"/>

  <!-- Snout (lowered, charging position) -->
  <polygon points="80,88 90,80 108,82 115,85 112,98 85,100" fill="url(#goldDark)"/>
  <polygon points="85,100 112,98 108,106 88,108" fill="#7a5c1a"/>

  <!-- Nostril -->
  <circle cx="95" cy="100" r="2.5" fill="#5a4210" opacity="0.6"/>
  <circle cx="105" cy="99" r="2.5" fill="#5a4210" opacity="0.6"/>

  <!-- Eye -->
  <circle cx="98" cy="74" r="2" fill="#1a1a1a"/>
  <circle cx="98.5" cy="73.5" r="0.7" fill="#e0c97f" opacity="0.6"/>

  <!-- Ear -->
  <polygon points="82,60 76,52 84,64" fill="#c9a84c" opacity="0.8"/>
  <polygon points="112,58 120,50 114,64" fill="#b89a40" opacity="0.8"/>

  <!-- NECK - thick, muscular -->
  <polygon points="80,88 85,100 90,110 120,115 135,100 118,72 115,85" fill="url(#goldBody)"/>

  <!-- SHOULDER HUMP -->
  <polygon points="120,115 135,100 160,85 175,82 185,88 180,105 155,115" fill="url(#goldBody)"/>
  <polygon points="160,85 175,82 185,88 175,90" fill="#e0c97f"/>

  <!-- UPPER BODY -->
  <polygon points="155,115 180,105 210,100 240,102 260,108 250,125 200,130 155,125" fill="url(#goldBody)"/>

  <!-- MAIN BODY -->
  <polygon points="200,130 250,125 280,120 310,118 320,125 310,140 260,145 200,142" fill="url(#goldBody)"/>
  <polygon points="260,145 310,140 330,135 340,138 335,150 290,155 260,150" fill="#b89a40"/>

  <!-- BELLY -->
  <polygon points="120,115 155,125 200,142 260,150 250,160 190,165 140,155 110,135 90,110" fill="url(#goldDark)"/>

  <!-- REAR BODY -->
  <polygon points="310,118 340,110 355,115 350,135 335,150 310,140" fill="#c9a84c"/>
  <polygon points="340,110 355,115 360,108" fill="#b89a40"/>

  <!-- TAIL -->
  <path d="M350,135 Q365,120 370,100 Q372,90 368,85" stroke="url(#goldBody)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M368,85 Q362,78 370,72 Q378,68 374,80" fill="#c9a84c"/>

  <!-- FRONT LEFT LEG (extended forward - charging) -->
  <polygon points="110,135 120,130 125,160 118,180 108,182 105,165" fill="url(#goldDark)"/>
  <polygon points="105,165 118,180 108,182 100,178" fill="#7a5c1a"/>
  <!-- Hoof -->
  <polygon points="100,178 108,182 118,180 115,186 102,186 98,182" fill="#1a1a1a"/>

  <!-- FRONT RIGHT LEG (back position) -->
  <polygon points="155,140 165,135 168,168 160,188 150,190 148,172" fill="#a08030"/>
  <polygon points="148,172 160,188 150,190 145,185" fill="#6a5418"/>
  <polygon points="145,185 150,190 160,188 158,194 147,194 143,189" fill="#1a1a1a"/>

  <!-- REAR LEFT LEG -->
  <polygon points="280,150 290,145 295,175 288,195 278,197 275,178" fill="url(#goldDark)"/>
  <polygon points="275,178 288,195 278,197 272,192" fill="#7a5c1a"/>
  <polygon points="272,192 278,197 288,195 286,201 274,201 270,196" fill="#1a1a1a"/>

  <!-- REAR RIGHT LEG (kicked back) -->
  <polygon points="320,145 335,140 340,170 332,192 322,194 318,175" fill="#a08030"/>
  <polygon points="318,175 332,192 322,194 316,188" fill="#6a5418"/>
  <polygon points="316,188 322,194 332,192 330,198 318,198 314,193" fill="#1a1a1a"/>

  <!-- MUSCLE DEFINITION LINES -->
  <line x1="135" y1="100" x2="175" y2="90" stroke="#e8d08a" stroke-width="0.5" opacity="0.3"/>
  <line x1="180" y1="105" x2="250" y2="125" stroke="#e8d08a" stroke-width="0.5" opacity="0.25"/>
  <line x1="200" y1="130" x2="300" y2="135" stroke="#e8d08a" stroke-width="0.4" opacity="0.2"/>

  <!-- OUTLINE PATH for stroke-draw animation -->
  <path id="bull-outline"
    d="M78,30 L95,72 L100,58 L120,25 L128,32 L118,72 L135,100 L175,82 L210,100 L280,120 L340,110 L360,108 L355,115 L350,135 Q365,120 370,100 Q372,90 368,85 Q362,78 370,72 M350,135 L335,150 L290,155 L250,160 L190,165 L140,155 L110,135 L90,110 L80,88 L78,65 L76,52 L82,60 L78,30"
    stroke="#c9a84c"
    stroke-width="1.5"
    fill="none"
    opacity="0"
  />
</svg>
