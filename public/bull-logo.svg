<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0c97f"/>
      <stop offset="50%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#a08030"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0c97f"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <linearGradient id="goldDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#a08030"/>
    </linearGradient>
    <linearGradient id="goldDeep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a08030"/>
      <stop offset="100%" stop-color="#8a6e28"/>
    </linearGradient>
    <linearGradient id="goldBodyV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0c97f"/>
      <stop offset="100%" stop-color="#a08030"/>
    </linearGradient>
  </defs>

  <!-- LEFT HORN - sweeping upward and outward -->
  <polygon points="58,42 42,10 50,18" fill="#e0c97f" opacity="0.95"/>
  <polygon points="50,18 42,10 36,16 48,30" fill="#c9a84c" opacity="0.9"/>
  <polygon points="48,30 50,18 58,42" fill="#b89a40" opacity="0.85"/>

  <!-- RIGHT HORN - sweeping upward and outward -->
  <polygon points="102,42 118,10 110,18" fill="#e0c97f" opacity="0.95"/>
  <polygon points="110,18 118,10 124,16 112,30" fill="#c9a84c" opacity="0.9"/>
  <polygon points="112,30 110,18 102,42" fill="#b89a40" opacity="0.85"/>

  <!-- HEAD - TOP (crown) -->
  <polygon points="58,42 80,34 102,42" fill="url(#goldLight)"/>
  <polygon points="58,42 68,38 80,34" fill="#dcc57a"/>
  <polygon points="80,34 92,38 102,42" fill="#d4b96e"/>

  <!-- LEFT EAR -->
  <polygon points="54,40 58,42 56,48" fill="#c9a84c" opacity="0.8"/>

  <!-- RIGHT EAR -->
  <polygon points="106,40 102,42 104,48" fill="#c9a84c" opacity="0.8"/>

  <!-- HEAD - FACE (front-facing, head held high) -->
  <polygon points="58,42 80,50 102,42" fill="url(#gold)"/>
  <polygon points="58,42 56,48 66,54 80,50" fill="#c9a84c"/>
  <polygon points="102,42 104,48 94,54 80,50" fill="#b89a40"/>

  <!-- EYES (subtle dark triangles) -->
  <polygon points="66,46 70,44 68,48" fill="#8a6e28" opacity="0.6"/>
  <polygon points="94,46 90,44 92,48" fill="#8a6e28" opacity="0.6"/>

  <!-- SNOUT / MUZZLE -->
  <polygon points="66,54 80,50 94,54 88,62 72,62" fill="url(#goldDark)"/>
  <polygon points="72,62 80,58 88,62" fill="#a08030"/>
  <polygon points="72,62 88,62 84,66 76,66" fill="#96762c"/>

  <!-- NOSTRILS (tiny dark marks) -->
  <polygon points="77,63 79,61 80,63" fill="#8a6e28" opacity="0.5"/>
  <polygon points="81,63 83,61 82,63" fill="#8a6e28" opacity="0.5"/>

  <!-- NECK - wide and powerful, head held high -->
  <polygon points="56,48 66,54 72,62 58,72" fill="url(#goldDark)"/>
  <polygon points="104,48 94,54 88,62 102,72" fill="#a08030"/>
  <polygon points="72,62 80,66 88,62 102,72 80,76 58,72" fill="#b89a40"/>

  <!-- SHOULDER HUMP - muscular prominence -->
  <polygon points="48,72 58,72 54,68 50,70" fill="#c9a84c"/>
  <polygon points="48,72 58,72 80,76 66,82 44,80" fill="url(#gold)"/>
  <polygon points="112,72 102,72 106,68 110,70" fill="#b89a40"/>
  <polygon points="112,72 102,72 80,76 94,82 116,80" fill="url(#goldDark)"/>

  <!-- UPPER BODY / TORSO - broad chest, standing tall -->
  <polygon points="44,80 66,82 80,76 94,82 116,80 112,92 80,94 48,92" fill="url(#gold)"/>
  <polygon points="44,80 48,92 56,90 66,82" fill="#c9a84c"/>
  <polygon points="116,80 112,92 104,90 94,82" fill="#a08030"/>

  <!-- MID BODY -->
  <polygon points="48,92 80,94 112,92 110,106 80,108 50,106" fill="url(#goldDark)"/>
  <polygon points="48,92 50,106 58,104 56,94" fill="#b89a40"/>
  <polygon points="112,92 110,106 102,104 104,94" fill="#96762c"/>

  <!-- LOWER BODY / BELLY -->
  <polygon points="50,106 80,108 110,106 108,120 80,122 52,120" fill="#b89a40"/>
  <polygon points="50,106 52,120 60,118 58,108" fill="#a08030"/>
  <polygon points="110,106 108,120 100,118 102,108" fill="#96762c"/>

  <!-- TAIL - hanging down calmly with slight curve -->
  <polygon points="112,92 118,88 120,94 116,102" fill="#c9a84c"/>
  <polygon points="118,88 124,84 122,92 120,94" fill="#e0c97f"/>
  <polygon points="124,84 128,86 126,94 122,92" fill="#dcc57a"/>
  <polygon points="126,94 128,86 130,92 128,100" fill="#c9a84c"/>
  <polygon points="128,100 130,92 132,98 130,106" fill="#b89a40"/>

  <!-- FRONT LEFT LEG - standing straight -->
  <polygon points="52,120 62,118 64,140 54,142" fill="url(#goldDark)"/>
  <polygon points="54,142 64,140 66,160 56,162" fill="#a08030"/>
  <polygon points="56,162 66,160 68,174 58,176" fill="#96762c"/>
  <!-- Hoof -->
  <polygon points="58,176 68,174 70,180 56,180" fill="#8a6e28"/>
  <polygon points="56,180 70,180 68,184 54,184" fill="#7a6224"/>

  <!-- FRONT RIGHT LEG - standing straight, slightly offset -->
  <polygon points="68,120 78,118 80,140 70,142" fill="#b89a40"/>
  <polygon points="70,142 80,140 82,160 72,162" fill="#a08030"/>
  <polygon points="72,162 82,160 84,174 74,176" fill="#8a6e28"/>
  <!-- Hoof -->
  <polygon points="74,176 84,174 86,180 72,180" fill="#7a6224"/>
  <polygon points="72,180 86,180 84,184 70,184" fill="#6e5820"/>

  <!-- REAR LEFT LEG - standing straight -->
  <polygon points="86,122 96,120 98,142 88,144" fill="url(#goldDark)"/>
  <polygon points="88,144 98,142 100,162 90,164" fill="#a08030"/>
  <polygon points="90,164 100,162 102,176 92,178" fill="#96762c"/>
  <!-- Hoof -->
  <polygon points="92,178 102,176 104,182 90,182" fill="#8a6e28"/>
  <polygon points="90,182 104,182 102,186 88,186" fill="#7a6224"/>

  <!-- REAR RIGHT LEG - standing straight -->
  <polygon points="100,122 110,120 112,142 102,144" fill="#b89a40"/>
  <polygon points="102,144 112,142 114,162 104,164" fill="#96762c"/>
  <polygon points="104,164 114,162 116,176 106,178" fill="#8a6e28"/>
  <!-- Hoof -->
  <polygon points="106,178 116,176 118,182 104,182" fill="#7a6224"/>
  <polygon points="104,182 118,182 116,186 102,186" fill="#6e5820"/>

  <!-- HIGHLIGHT EDGES for faceted/geometric look -->
  <line x1="80" y1="34" x2="80" y2="50" stroke="#e8d494" stroke-width="0.5" opacity="0.4"/>
  <line x1="80" y1="76" x2="80" y2="94" stroke="#e8d494" stroke-width="0.4" opacity="0.3"/>
  <line x1="44" y1="80" x2="116" y2="80" stroke="#e8d494" stroke-width="0.4" opacity="0.25"/>
  <line x1="48" y1="92" x2="112" y2="92" stroke="#e8d494" stroke-width="0.3" opacity="0.2"/>
  <line x1="58" y1="42" x2="80" y2="50" stroke="#e8d494" stroke-width="0.4" opacity="0.3"/>
  <line x1="102" y1="42" x2="80" y2="50" stroke="#e8d494" stroke-width="0.4" opacity="0.3"/>
</svg>
