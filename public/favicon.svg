<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="fgold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0c97f"/>
      <stop offset="50%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#a08030"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="12" fill="#0a0a0a"/>

  <!-- Bull head silhouette - geometric/low-poly -->
  <!-- Left horn -->
  <polygon points="28,28 18,12 30,32" fill="url(#fgold)"/>
  <polygon points="18,12 14,16 28,32" fill="#a08030"/>

  <!-- Right horn -->
  <polygon points="72,28 82,12 70,32" fill="url(#fgold)"/>
  <polygon points="82,12 86,16 72,32" fill="#a08030"/>

  <!-- Head top -->
  <polygon points="30,32 50,26 72,28 70,32" fill="#e0c97f"/>
  <polygon points="28,32 30,32 50,26" fill="#d4b96e"/>

  <!-- Forehead -->
  <polygon points="30,32 50,34 70,32 50,26" fill="#c9a84c"/>

  <!-- Left face -->
  <polygon points="28,32 30,44 42,50 50,34 30,32" fill="#bfa044"/>

  <!-- Right face -->
  <polygon points="70,32 72,44 58,50 50,34 70,32" fill="#b89a40"/>

  <!-- Left cheek -->
  <polygon points="30,44 28,56 38,60 42,50" fill="#a08030"/>

  <!-- Right cheek -->
  <polygon points="72,44 72,56 62,60 58,50" fill="#a08030"/>

  <!-- Nose bridge -->
  <polygon points="42,50 50,48 58,50 50,58" fill="#c9a84c"/>

  <!-- Snout left -->
  <polygon points="38,60 42,50 50,58 44,68" fill="#b89a40"/>

  <!-- Snout right -->
  <polygon points="62,60 58,50 50,58 56,68" fill="#b89a40"/>

  <!-- Muzzle -->
  <polygon points="44,68 50,58 56,68 56,76 50,78 44,76" fill="#a08030"/>

  <!-- Nostrils area -->
  <polygon points="44,76 50,74 56,76 54,80 50,82 46,80" fill="#96762c"/>

  <!-- Left ear -->
  <polygon points="22,26 28,28 26,36" fill="#c9a84c" opacity="0.9"/>

  <!-- Right ear -->
  <polygon points="78,26 72,28 74,36" fill="#c9a84c" opacity="0.9"/>

  <!-- Eye accents (small bright triangles) -->
  <polygon points="38,40 42,38 40,43" fill="#e0c97f" opacity="0.7"/>
  <polygon points="62,40 58,38 60,43" fill="#e0c97f" opacity="0.7"/>
</svg>
